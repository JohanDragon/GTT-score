<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTT Rankings - Live Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-side { border: 6px solid #fbbf24; transform: scale(1.02); box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .sync-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans select-none">

    <div class="max-w-2xl mx-auto space-y-6 pb-12">
        <header class="text-center py-4">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-tighter">
                GTT Rankings
            </h1>
            <div class="flex justify-center items-center mt-1">
                <span id="status-dot" class="sync-indicator bg-slate-700"></span>
                <p id="status-text" class="text-slate-500 text-[10px] font-bold tracking-[0.3em] uppercase">Connecting Cloud...</p>
            </div>
        </header>

        <section class="glass p-6 rounded-3xl border border-slate-800 shadow-2xl space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold text-center">Format</label>
                    <select id="match-format" onchange="syncSettings()" class="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 font-bold text-center">
                        <option value="3">Best of 5</option>
                        <option value="4">Best of 7</option>
                        <option value="1">Win 1 Set</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold text-center">G1 Server</label>
                    <select id="manual-server" onchange="initGameServer()" class="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 font-bold text-yellow-500 text-center">
                        <option value="1">P1 Start</option>
                        <option value="2">P2 Start</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex gap-3 items-center">
                    <select id="p1-select" onchange="syncMatchSelection()" class="flex-1 bg-slate-700 p-3 rounded-xl outline-none text-blue-400 font-bold text-center"></select>
                    <span class="text-xl font-black text-slate-600 italic">VS</span>
                    <select id="p2-select" onchange="syncMatchSelection()" class="flex-1 bg-slate-700 p-3 rounded-xl outline-none text-red-400 font-bold text-center"></select>
                </div>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="Add..." class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-800 outline-none text-center">
                    <button onclick="addPlayer()" class="bg-yellow-500 text-black px-4 font-black rounded-xl active:scale-95 transition">ADD</button>
                    <button onclick="deleteSelectedPlayer()" class="bg-red-900/50 text-red-400 px-4 font-black rounded-xl active:scale-95 transition">DEL</button>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 gap-4">
            <div id="card-1" class="glass p-6 rounded-[2.5rem] border border-slate-800 text-center transition-all">
                <div id="name-1" class="text-sm font-bold text-blue-400 mb-1 truncate">---</div>
                <div id="games-1" class="text-[10px] text-slate-500 mb-1 font-mono font-bold uppercase tracking-widest">Games: 0</div>
                <div id="score-1" class="text-[7.5rem] leading-none font-black mb-6">0</div>
                <button onclick="changeScore(1, 1)" class="w-full bg-blue-600 h-28 rounded-3xl text-5xl font-black shadow-xl active:bg-blue-500 transition">＋</button>
            </div>

            <div id="card-2" class="glass p-6 rounded-[2.5rem] border border-slate-800 text-center transition-all">
                <div id="name-2" class="text-sm font-bold text-red-400 mb-1 truncate">---</div>
                <div id="games-2" class="text-[10px] text-slate-500 mb-1 font-mono font-bold uppercase tracking-widest">Games: 0</div>
                <div id="score-2" class="text-[7.5rem] leading-none font-black mb-6">0</div>
                <button onclick="changeScore(2, 1)" class="w-full bg-red-600 h-28 rounded-3xl text-5xl font-black shadow-xl active:bg-red-500 transition">＋</button>
            </div>
        </main>

        <div class="flex gap-4">
            <button onclick="undo()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-slate-400 text-xs uppercase border border-slate-700">Return (Max 2)</button>
            <button onclick="resetMatch()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-slate-400 text-xs uppercase border border-slate-700">Reset</button>
        </div>

        <section class="space-y-3">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-lg font-black uppercase text-slate-500 tracking-tighter">Recent 5 Matches</h2>
                <button onclick="clearHistory()" class="text-[10px] text-slate-700 font-bold uppercase">Clear</button>
            </div>
            <div id="history-container" class="space-y-2"></div>
        </section>
    </div>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyAQlhy2WXQ3M8e_olUj3xIRmmxv759lrrc",
            authDomain: "gtt-rankings.firebaseapp.com",
            databaseURL: "https://gtt-rankings-default-rtdb.firebaseio.com",
            projectId: "gtt-rankings",
            storageBucket: "gtt-rankings.firebasestorage.app",
            messagingSenderId: "96701388869",
            appId: "1:96701388869:web:f66a13c8cffe70c0c4eb2c",
            measurementId: "G-MJWRM5ZV8K"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dataRef = db.ref('gtt_live_data');

        // Initial State
        let players = [{ name: 'Player 1', elo: 1200 }, { name: 'Player 2', elo: 1200 }];
        let matchHistory = [];
        let gameState = { 
            p1Score: 0, p2Score: 0, 
            p1Games: 0, p2Games: 0, 
            gameFirstServer: 1, 
            history: [],
            matchFormat: 3,
            p1Index: 0,
            p2Index: 1
        };
        const K = 32;

        // --- Core Sync Logic ---

        function cloudPush() {
            dataRef.set({ players, matchHistory, gameState });
        }

        dataRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                players = data.players || players;
                matchHistory = data.matchHistory || matchHistory;
                if (data.gameState) gameState = data.gameState;
                
                // Sync UI Inputs
                document.getElementById('match-format').value = gameState.matchFormat;
                
                updateUI();
                renderHistory();
                updatePlayerOptions();
                
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').innerText = "Live Synced";
            }
        });

        // --- Game Functions ---

        function initGameServer() {
            gameState.gameFirstServer = parseInt(document.getElementById('manual-server').value);
            cloudPush();
        }

        function syncSettings() {
            gameState.matchFormat = parseInt(document.getElementById('match-format').value);
            cloudPush();
        }

        function syncMatchSelection() {
            gameState.p1Index = document.getElementById('p1-select').selectedIndex;
            gameState.p2Index = document.getElementById('p2-select').selectedIndex;
            cloudPush();
        }

        function addPlayer() {
            const name = document.getElementById('new-name').value.trim();
            if (!name) return;
            players.push({ name, elo: 1200 });
            document.getElementById('new-name').value = '';
            cloudPush();
        }

        function deleteSelectedPlayer() {
            const idx = document.getElementById('p1-select').selectedIndex;
            if (players.length <= 2) return alert("Min 2 players");
            if (confirm(`Delete ${players[idx].name}?`)) {
                players.splice(idx, 1);
                // Ensure index is still valid
                gameState.p1Index = 0;
                gameState.p2Index = players.length > 1 ? 1 : 0;
                cloudPush();
            }
        }

        function changeScore(player, val) {
            gameState.history = gameState.history || [];
            gameState.history.push(JSON.stringify({
                s1: gameState.p1Score, s2: gameState.p2Score, 
                g1: gameState.p1Games, g2: gameState.p2Games, 
                fs: gameState.gameFirstServer
            }));
            if (gameState.history.length > 2) gameState.history.shift();

            player === 1 ? gameState.p1Score += val : gameState.p2Score += val;
            
            const d = Math.abs(gameState.p1Score - gameState.p2Score);
            if ((gameState.p1Score >= 11 || gameState.p2Score >= 11) && d >= 2) {
                gameState.p1Score > gameState.p2Score ? gameState.p1Games++ : gameState.p2Games++;
                gameState.p1Score = 0; gameState.p2Score = 0;
                gameState.gameFirstServer = (gameState.gameFirstServer === 1) ? 2 : 1;
                
                if (gameState.p1Games == gameState.matchFormat || gameState.p2Games == gameState.matchFormat) {
                    recordMatch();
                    return;
                }
            }
            cloudPush();
        }

        function undo() {
            if (gameState.history && gameState.history.length > 0) {
                const last = JSON.parse(gameState.history.pop());
                gameState.p1Score = last.s1; gameState.p2Score = last.s2;
                gameState.p1Games = last.g1; gameState.p2Games = last.g2;
                gameState.gameFirstServer = last.fs;
                cloudPush();
            }
        }

        function recordMatch() {
            const i1 = gameState.p1Index, i2 = gameState.p2Index;
            const p1Won = gameState.p1Games > gameState.p2Games;
            
            matchHistory.unshift({
                d: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                n1: players[i1].name, n2: players[i2].name,
                s: `${gameState.p1Games}-${gameState.p2Games}`, w: p1Won ? players[i1].name : players[i2].name
            });
            if (matchHistory.length > 5) matchHistory.pop();

            const p1 = players[i1], p2 = players[i2];
            const exp = 1 / (1 + Math.pow(10, (p2.elo - p1.elo) / 400));
            const change = Math.round(K * ((p1Won ? 1 : 0) - exp));
            p1.elo += change; p2.elo -= change;

            gameState.p1Score = 0; gameState.p2Score = 0;
            gameState.p1Games = 0; gameState.p2Games = 0;
            gameState.history = [];
            
            cloudPush();
            alert("MATCH OVER");
        }

        function resetMatch() {
            if(!confirm("Reset match?")) return;
            gameState.p1Score = 0; gameState.p2Score = 0;
            gameState.p1Games = 0; gameState.p2Games = 0;
            gameState.history = [];
            cloudPush();
        }

        function updatePlayerOptions() {
            const options = players.map(p => `<option value="${p.name}">${p.name} [${p.elo}]</option>`).join('');
            const s1 = document.getElementById('p1-select');
            const s2 = document.getElementById('p2-select');
            if (s1.options.length !== players.length) {
                s1.innerHTML = options; s2.innerHTML = options;
                s1.selectedIndex = gameState.p1Index;
                s2.selectedIndex = gameState.p2Index;
            }
        }

        function updateUI() {
            document.getElementById('score-1').innerText = gameState.p1Score;
            document.getElementById('score-2').innerText = gameState.p2Score;
            document.getElementById('games-1').innerText = `Games: ${gameState.p1Games}`;
            document.getElementById('games-2').innerText = `Games: ${gameState.p2Games}`;
            
            document.getElementById('name-1').innerText = players[gameState.p1Index] ? players[gameState.p1Index].name : "---";
            document.getElementById('name-2').innerText = players[gameState.p2Index] ? players[gameState.p2Index].name : "---";

            const total = gameState.p1Score + gameState.p2Score;
            const deuce = (gameState.p1Score >= 10 && gameState.p2Score >= 10);
            const turn = deuce ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            const p1Serves = (gameState.gameFirstServer === 1) ? turn : !turn;

            document.getElementById('card-1').classList.toggle('active-side', p1Serves);
            document.getElementById('card-2').classList.toggle('active-side', !p1Serves);
        }

        function renderHistory() {
            document.getElementById('history-container').innerHTML = matchHistory.map(h => `
                <div class="glass p-3 rounded-xl border border-slate-800 flex justify-between items-center text-xs">
                    <div class="font-bold"><span class="text-blue-400">${h.n1}</span> vs <span class="text-red-400">${h.n2}</span></div>
                    <div class="text-right"><span class="text-yellow-500 font-black mr-2">${h.s}</span> <span class="text-slate-600 font-mono text-[9px]">${h.d}</span></div>
                </div>
            `).join('');
        }

        function clearHistory() { 
            if(!confirm("Clear history?")) return;
            matchHistory = []; cloudPush(); 
        }
    </script>
</body>
</html>
