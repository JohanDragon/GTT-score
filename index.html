<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTT Rankings - Pro Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-side { border: 6px solid #fbbf24; transform: scale(1.02); box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans">

    <div class="max-w-2xl mx-auto space-y-6">
        <header class="text-center py-6">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-tighter">
                GTT Rankings
            </h1>
            <p class="text-slate-500 text-xs font-bold tracking-widest mt-1">PRO TABLE TENNIS SYSTEM</p>
        </header>

        <section class="glass p-6 rounded-3xl border border-slate-800 shadow-2xl">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold">Match Format</label>
                    <select id="match-format" class="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 font-bold">
                        <option value="3">Best of 5 (Win 3)</option>
                        <option value="4">Best of 7 (Win 4)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-500 mb-2 font-bold">Game 1 Server</label>
                    <select id="manual-server" onchange="initGameServer()" class="w-full bg-slate-800 p-3 rounded-xl outline-none border border-slate-700 font-bold text-yellow-500">
                        <option value="1">Player 1 Starts</option>
                        <option value="2">Player 2 Starts</option>
                    </select>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex gap-3 items-center">
                    <div class="flex-1">
                        <label class="text-[10px] text-slate-500 font-bold ml-1 uppercase">P1 Selection</label>
                        <select id="p1-select" onchange="updateUI()" class="w-full bg-slate-700 p-3 rounded-xl outline-none text-blue-400 font-bold"></select>
                    </div>
                    <span class="text-2xl font-black text-slate-600 mt-4 italic">VS</span>
                    <div class="flex-1">
                        <label class="text-[10px] text-slate-500 font-bold ml-1 uppercase">P2 Selection</label>
                        <select id="p2-select" onchange="updateUI()" class="w-full bg-slate-700 p-3 rounded-xl outline-none text-red-400 font-bold"></select>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="Add new player..." class="flex-1 bg-slate-900 p-3 rounded-xl border border-slate-800 outline-none focus:border-yellow-500 transition">
                    <button onclick="addPlayer()" class="bg-yellow-500 text-black px-8 font-black rounded-xl hover:bg-yellow-400 active:scale-95 transition">ADD</button>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 gap-4">
            <div id="card-1" class="glass p-6 rounded-[2rem] border border-slate-800 text-center transition-all">
                <div id="name-1" class="text-lg font-bold text-blue-400 mb-2 truncate">---</div>
                <div id="games-1" class="text-xs text-slate-500 mb-1 font-mono font-bold uppercase">Games: 0</div>
                <div id="score-1" class="text-[7rem] leading-none font-black mb-8">0</div>
                <button onclick="changeScore(1, 1)" class="w-full bg-blue-600 h-28 rounded-2xl text-4xl font-black shadow-xl active:scale-90 transition">＋</button>
            </div>

            <div id="card-2" class="glass p-6 rounded-[2rem] border border-slate-800 text-center transition-all">
                <div id="name-2" class="text-lg font-bold text-red-400 mb-2 truncate">---</div>
                <div id="games-2" class="text-xs text-slate-500 mb-1 font-mono font-bold uppercase">Games: 0</div>
                <div id="score-2" class="text-[7rem] leading-none font-black mb-8">0</div>
                <button onclick="changeScore(2, 1)" class="w-full bg-red-600 h-28 rounded-2xl text-4xl font-black shadow-xl active:scale-90 transition">＋</button>
            </div>
        </main>

        <div class="flex gap-4">
            <button onclick="undo()" class="flex-1 bg-slate-800 py-5 rounded-2xl font-black text-slate-400 hover:text-white transition uppercase tracking-widest border border-slate-700">Undo Action</button>
            <button onclick="resetMatch()" class="flex-1 bg-slate-800 py-5 rounded-2xl font-black text-slate-400 hover:text-red-400 transition uppercase tracking-widest border border-slate-700">Reset Match</button>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('gtt_players')) || [
            { name: 'Player A', elo: 1200 },
            { name: 'Player B', elo: 1200 }
        ];
        
        let gameState = {
            p1Score: 0, p2Score: 0,
            p1Games: 0, p2Games: 0,
            gameFirstServer: 1, 
            history: []
        };

        const K = 32;

        function initGameServer() {
            gameState.gameFirstServer = parseInt(document.getElementById('manual-server').value);
            updateUI();
        }

        function addPlayer() {
            const input = document.getElementById('new-name');
            const name = input.value.trim();
            if (!name) return;
            players.push({ name: name, elo: 1200 });
            input.value = '';
            save();
            updatePlayerList();
        }

        function changeScore(player, val) {
            gameState.history.push(JSON.parse(JSON.stringify(gameState)));
            player === 1 ? gameState.p1Score += val : gameState.p2Score += val;
            checkGameEnd();
            updateUI();
        }

        function undo() {
            if (gameState.history.length > 0) {
                gameState = gameState.history.pop();
                updateUI();
            }
        }

        function checkGameEnd() {
            const diff = Math.abs(gameState.p1Score - gameState.p2Score);
            if ((gameState.p1Score >= 11 || gameState.p2Score >= 11) && diff >= 2) {
                gameState.p1Score > gameState.p2Score ? gameState.p1Games++ : gameState.p2Games++;
                gameState.p1Score = 0;
                gameState.p2Score = 0;
                gameState.gameFirstServer = (gameState.gameFirstServer === 1) ? 2 : 1;
                checkMatchEnd();
            }
        }

        function checkMatchEnd() {
            const winReq = parseInt(document.getElementById('match-format').value);
            if (gameState.p1Games === winReq || gameState.p2Games === winReq) {
                const p1Idx = document.getElementById('p1-select').selectedIndex;
                const p2Idx = document.getElementById('p2-select').selectedIndex;
                updateElo(p1Idx, p2Idx, gameState.p1Games === winReq);
                alert("GTT MATCH OVER!");
                resetMatch();
            }
        }

        function updateElo(idx1, idx2, p1Won) {
            const p1 = players[idx1], p2 = players[idx2];
            const exp = 1 / (1 + Math.pow(10, (p2.elo - p1.elo) / 400));
            const change = Math.round(K * ((p1Won ? 1 : 0) - exp));
            p1.elo += change; p2.elo -= change;
            save();
            updatePlayerList();
        }

        function updateUI() {
            document.getElementById('score-1').innerText = gameState.p1Score;
            document.getElementById('score-2').innerText = gameState.p2Score;
            document.getElementById('games-1').innerText = `Games: ${gameState.p1Games}`;
            document.getElementById('games-2').innerText = `Games: ${gameState.p2Games}`;
            
            const sel1 = document.getElementById('p1-select');
            const sel2 = document.getElementById('p2-select');
            if(sel1.value) document.getElementById('name-1').innerText = sel1.value;
            if(sel2.value) document.getElementById('name-2').innerText = sel2.value;

            const total = gameState.p1Score + gameState.p2Score;
            const isDeuce = (gameState.p1Score >= 10 && gameState.p2Score >= 10);
            let p1Serves;

            const currentTurn = isDeuce ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            p1Serves = (gameState.gameFirstServer === 1) ? currentTurn : !currentTurn;

            document.getElementById('card-1').classList.toggle('active-side', p1Serves);
            document.getElementById('card-2').classList.toggle('active-side', !p1Serves);
        }

        function updatePlayerList() {
            const s1 = document.getElementById('p1-select'), s2 = document.getElementById('p2-select');
            const options = players.map(p => `<option value="${p.name}">${p.name} [${p.elo}]</option>`).join('');
            s1.innerHTML = options; s2.innerHTML = options;
            if (players.length > 1) s2.selectedIndex = 1;
            updateUI();
        }

        function resetMatch() {
            const initialServer = parseInt(document.getElementById('manual-server').value);
            gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: initialServer, history: [] };
            updateUI();
        }

        function save() { localStorage.setItem('gtt_players', JSON.stringify(players)); }
        
        updatePlayerList();
    </script>
</body>
</html>
