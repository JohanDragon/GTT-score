<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GTT Rankings - Unified Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; }
        .active-side { border: 6px solid #fbbf24; transform: scale(1.02); box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        
        .sync-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        
        /* 發球小燈號樣式 */
        .serve-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #334155; display: inline-block; margin-right: 6px;
            transition: all 0.3s ease;
        }
        .serve-dot.active {
            background: #fbbf24; box-shadow: 0 0 8px #fbbf24;
        }

        .status-light {
            width: 12px; height: 12px; border-radius: 50%;
            background: #334155; transition: all 0.3s ease; display: inline-block;
        }

        .table-btn { 
            @apply flex-1 py-5 text-[18px] font-black rounded-xl transition-all border border-slate-800 bg-slate-900 text-slate-500 flex items-center justify-center gap-2 uppercase italic; 
        }

        .table-btn.active { 
            @apply bg-slate-800 text-yellow-500 border-yellow-500 shadow-lg shadow-yellow-500/10; 
        }
        
        .table-btn.active .status-light {
            background: #fbbf24; box-shadow: 0 0 8px #fbbf24, 0 0 15px #fbbf24;
        }

        #custom-alert { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        .admin-only { display: none; }
        
        @media (orientation: landscape) { .player-name-text { font-size: 1.5rem !important; } .score-text { font-size: 10rem !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans select-none">

    <!-- 比賽結束彈窗 -->
    <div id="custom-alert" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[100] w-[85%] max-w-xs glass border border-yellow-500/50 p-8 rounded-[2.5rem] text-center shadow-2xl fade-in">
        <div class="text-5xl mb-4">🏆</div>
        <h2 class="text-2xl font-black uppercase mb-2">Match Finished</h2>
        <p id="winner-info" class="text-yellow-500 font-bold mb-6 italic text-lg"></p>
        <button onclick="closeAlert()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase active:scale-95 transition">Confirm</button>
    </div>

    <div class="max-w-4xl mx-auto space-y-5 pb-12">
        <header class="text-center py-4">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-tighter italic">
                GTT RANKINGS
            </h1>
            
            <div class="flex gap-2 mt-8 max-w-lg mx-auto">
                <button onclick="switchTable(1)" id="btn-t1" class="table-btn"><span class="status-light"></span> TABLE 1</button>
                <button onclick="switchTable(2)" id="btn-t2" class="table-btn"><span class="status-light"></span> TABLE 2</button>
                <button onclick="switchTable(3)" id="btn-t3" class="table-btn"><span class="status-light"></span> TABLE 3</button>
            </div>

            <div class="flex flex-col items-center justify-center mt-6 space-y-2">
                <div class="flex items-center">
                    <span id="status-dot" class="sync-indicator"></span>
                    <span id="status-text" class="text-lg font-black text-slate-400 uppercase tracking-[0.2em]">Connecting...</span>
                </div>
                <div id="mode-badge" class="px-6 py-2 rounded-full bg-blue-500/20 text-blue-400 text-sm font-black tracking-[0.3em] border border-blue-500/30 uppercase">SANCIPA MODE</div>
            </div>
        </header>

        <section class="glass p-5 rounded-[2rem] border border-slate-800 shadow-2xl space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <select id="match-format" onchange="syncSettings()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-sm outline-none">
                    <option value="3">3 Sets Win (BO5)</option>
                    <option value="4">4 Sets Win (BO7)</option>
                    <option value="5">5 Sets Win (BO9)</option>
                </select>
                <!-- 更新後的發球選擇器 -->
                <select id="manual-server" onchange="initGameServer()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-yellow-500 text-sm outline-none">
                    <option value="0">-- Serve --</option>
                    <option value="1">P1 Serve</option>
                    <option value="2">P2 Serve</option>
                </select>
            </div>
            <div class="space-y-3">
                <div class="flex items-center justify-between bg-slate-900/40 p-2 rounded-2xl border border-white/5">
                    <select id="p1-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-blue-400 font-black text-center text-sm"></select>
                    <div class="text-slate-700 font-black italic">VS</div>
                    <select id="p2-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-red-400 font-black text-center text-sm"></select>
                </div>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="New Name..." class="flex-1 bg-slate-900/50 p-3 rounded-xl border border-slate-800 outline-none text-center text-sm">
                    <button onclick="addPlayer()" class="bg-yellow-500 text-black px-5 font-black rounded-xl text-xs">ADD</button>
                    <button onclick="deleteSelectedPlayer()" class="admin-only bg-red-900/50 text-red-500 px-5 font-black rounded-xl text-xs border border-red-900/50">DEL</button>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 gap-4">
            <div id="card-left" class="glass p-5 rounded-[2.5rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-left" class="player-name-text text-sm font-black mb-1 truncate uppercase">---</div>
                    <!-- 帶有發球燈號的 Sets 區域 -->
                    <div class="flex items-center justify-center text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase tracking-widest">
                        <span id="serve-dot-left" class="serve-dot"></span>
                        <span id="games-left">Sets: 0</span>
                    </div>
                </div>
                <div id="score-left" class="score-text text-[8rem] leading-none font-black mb-4">0</div>
                <button onclick="handleLeftClick()" id="btn-score-left" class="w-full py-8 rounded-[1.5rem] text-5xl font-black shadow-xl transition">＋</button>
            </div>
            <div id="card-right" class="glass p-5 rounded-[2.5rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-right" class="player-name-text text-sm font-black mb-1 truncate uppercase">---</div>
                    <!-- 帶有發球燈號的 Sets 區域 -->
                    <div class="flex items-center justify-center text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase tracking-widest">
                        <span id="serve-dot-right" class="serve-dot"></span>
                        <span id="games-right">Sets: 0</span>
                    </div>
                </div>
                <div id="score-right" class="score-text text-[8rem] leading-none font-black mb-4">0</div>
                <button onclick="handleRightClick()" id="btn-score-right" class="w-full py-8 rounded-[1.5rem] text-5xl font-black shadow-xl transition">＋</button>
            </div>
        </main>

        <div class="flex gap-4">
            <button onclick="undo()" class="flex-1 bg-slate-900 py-4 rounded-xl font-black text-slate-500 text-[10px] border border-slate-800 uppercase tracking-widest">Return</button>
            <button onclick="resetMatch()" class="flex-1 bg-slate-900 py-4 rounded-xl font-black text-slate-500 text-[10px] border border-slate-800 uppercase tracking-widest">Reset</button>
        </div>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-yellow-500 px-2 tracking-widest flex items-center"><span class="mr-2">🏆</span> Ranking Leaderboard</h2>
            <div id="leaderboard" class="glass rounded-[1.5rem] border border-slate-800 overflow-hidden divide-y divide-slate-800/50"></div>
        </section>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-slate-600 px-2 tracking-widest">Global History</h2>
            <div id="history-list" class="space-y-2"></div>
        </section>
    </div>

    <script>
        // 你提供的 Firebase 設定已填入下方
        const firebaseConfig = {
            apiKey: "AIzaSyAQlhy2WXQ3M8e_olUj3xIRmmxv759lrrc",
            authDomain: "gtt-rankings.firebaseapp.com",
            databaseURL: "https://gtt-rankings-default-rtdb.firebaseio.com",
            projectId: "gtt-rankings",
            storageBucket: "gtt-rankings.firebasestorage.app",
            messagingSenderId: "96701388869",
            appId: "1:96701388869:web:f66a13c8cffe70c0c4eb2c",
            measurementId: "G-MJWRM5ZV8K"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('auth') === 'admin';
        
        let players = []; 
        let globalHistory = [];
        let currentTable = parseInt(localStorage.getItem('gtt_active_table')) || 1;
        let gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: 0, history: [], matchFormat: 3, p1Index: -1, p2Index: -1, setScores: [], isGameOver: false };

        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            const badge = document.getElementById('mode-badge');
            badge.innerText = "RANKING MODE"; badge.classList.replace('bg-blue-500/20', 'bg-red-500/20'); 
            badge.classList.replace('text-blue-400', 'text-red-500'); badge.classList.add('border-red-500/30');
        }

        const playersRef = db.ref('gtt_unified/players');
        const historyRef = db.ref('gtt_unified/global_history');
        let tableRef = null;

        playersRef.on('value', (snap) => { players = snap.val() || []; updatePlayerOptions(); renderLeaderboard(); updateUI(); });
        historyRef.on('value', (snap) => { globalHistory = snap.val() || []; renderHistory(); });

        function switchTable(num) {
            if (tableRef) tableRef.off();
            currentTable = num;
            localStorage.setItem('gtt_active_table', num);
            tableRef = db.ref(`gtt_unified/table_${num}_state`);
            tableRef.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    gameState = data;
                    if (!gameState.history) gameState.history = [];
                    if (!gameState.setScores) gameState.setScores = [];
                } else { initLocalState(); }
                updateUI();
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').innerText = `Table ${currentTable} Live`;
            });
            updateTableUI();
        }

        function initLocalState() {
            gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: 0, history: [], matchFormat: 3, p1Index: -1, p2Index: -1, setScores: [], isGameOver: false };
        }

        function updateTableUI() { 
            [1, 2, 3].forEach(n => {
                const btn = document.getElementById(`btn-t${n}`);
                n === currentTable ? btn.classList.add('active') : btn.classList.remove('active');
            }); 
        }

        function pushTable() { if(tableRef) tableRef.set(gameState); }
        function pushPlayers() { playersRef.set(players); }
        function pushHistory() { historyRef.set(globalHistory); }

        function handleLeftClick() {
            const isSwapped = (gameState.p1Games + gameState.p2Games) % 2 !== 0;
            changeScore(isSwapped ? 2 : 1, 1);
        }

        function handleRightClick() {
            const isSwapped = (gameState.p1Games + gameState.p2Games) % 2 !== 0;
            changeScore(isSwapped ? 1 : 2, 1);
        }

        function changeScore(p, v) {
            if (gameState.isGameOver) return;
            if (gameState.p1Index === -1 || gameState.p2Index === -1) { alert("Please select both players!"); return; }
            
            gameState.history.push(JSON.stringify({ s1: gameState.p1Score, s2: gameState.p2Score, g1: gameState.p1Games, g2: gameState.p2Games, fs: gameState.gameFirstServer, ss: [...(gameState.setScores || [])] }));
            if (gameState.history.length > 5) gameState.history.shift();

            p === 1 ? gameState.p1Score += v : gameState.p2Score += v;
            
            const diff = Math.abs(gameState.p1Score - gameState.p2Score);
            if ((gameState.p1Score >= 11 || gameState.p2Score >= 11) && diff >= 2) {
                gameState.setScores.push(`${gameState.p1Score}-${gameState.p2Score}`);
                gameState.p1Score > gameState.p2Score ? gameState.p1Games++ : gameState.p2Games++;
                gameState.p1Score = 0; gameState.p2Score = 0;
                if(gameState.gameFirstServer !== 0) {
                    gameState.gameFirstServer = (gameState.gameFirstServer === 1) ? 2 : 1;
                }
                
                if (gameState.p1Games >= gameState.matchFormat || gameState.p2Games >= gameState.matchFormat) { 
                    gameState.isGameOver = true;
                    saveMatchResult(); 
                    return; 
                }
            }
            pushTable();
        }

        function saveMatchResult() {
            const p1Won = gameState.p1Games > gameState.p2Games;
            const p1 = players[gameState.p1Index], p2 = players[gameState.p2Index];
            let gainDisplay = "";
            if (isAdmin) {
                const exp = 1 / (1 + Math.pow(10, (p2.elo - p1.elo) / 400));
                const gain = Math.abs(Math.round(32 * ((p1Won ? 1 : 0) - exp)));
                p1.elo += (p1Won ? gain : -gain); 
                p2.elo += (p1Won ? -gain : gain);
                pushPlayers();
                gainDisplay = `(+${gain} pts)`;
                document.getElementById('winner-info').innerText = `${p1Won ? p1.name : p2.name} ${gainDisplay}`;
            } else {
                document.getElementById('winner-info').innerText = `${p1Won ? p1.name : p2.name} WINS!`;
            }
            globalHistory.unshift({
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                p1: p1.name, p2: p2.name,
                score: `${gameState.p1Games}-${gameState.p2Games}`,
                sets: gameState.setScores.join(', '),
                mode: isAdmin ? "[RANKING]" : "[SANCIPA]",
                table: `T${currentTable}`
            });
            pushHistory();
            document.getElementById('custom-alert').style.display = 'block';
            pushTable();
        }

        function closeAlert() { 
            document.getElementById('custom-alert').style.display = 'none'; 
            Object.assign(gameState, { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, history: [], setScores: [], p1Index: -1, p2Index: -1, isGameOver: false, gameFirstServer: 0 });
            pushTable(); 
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = globalHistory.map(r => `
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase">
                        <span class="${r.mode === '[RANKING]' ? 'text-red-500' : 'text-blue-400'}">${r.mode} | ${r.table}</span>
                        <span class="text-slate-600">${r.time}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-sm font-bold uppercase"><span class="text-blue-400">${r.p1}</span> <span class="text-slate-700 text-[10px]">vs</span> <span class="text-red-400">${r.p2}</span></div>
                        <div class="text-lg font-black text-yellow-500">${r.score}</div>
                    </div>
                    <div class="text-[10px] text-slate-500 font-mono italic">Sets: ${r.sets}</div>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            const sorted = [...players].sort((a, b) => b.elo - a.elo);
            container.innerHTML = sorted.map((p, i) => `
                <div class="flex items-center justify-between p-5 ${i === 0 ? 'bg-yellow-500/10' : ''}">
                    <div class="flex items-center gap-4">
                        <span class="w-8 text-center font-black text-lg ${i < 3 ? 'text-yellow-500' : 'text-slate-600'}">${i + 1}</span>
                        <span class="font-black uppercase text-sm">${p.name}</span>
                    </div>
                    <div class="font-mono font-black text-yellow-500 text-lg">${p.elo}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            const totalSets = gameState.p1Games + gameState.p2Games;
            const isSwapped = totalSets % 2 !== 0;

            const leftPlayer = isSwapped ? 2 : 1;
            const rightPlayer = isSwapped ? 1 : 2;
            const leftIdx = gameState[`p${leftPlayer}Index`];
            const rightIdx = gameState[`p${rightPlayer}Index`];

            document.getElementById('name-left').innerText = players[leftIdx]?.name || `P${leftPlayer}`;
            document.getElementById('name-right').innerText = players[rightIdx]?.name || `P${rightPlayer}`;
            
            document.getElementById('name-left').className = `player-name-text text-sm font-black mb-1 truncate uppercase ${leftPlayer === 1 ? 'text-blue-400' : 'text-red-400'}`;
            document.getElementById('name-right').className = `player-name-text text-sm font-black mb-1 truncate uppercase ${rightPlayer === 1 ? 'text-blue-400' : 'text-red-400'}`;

            document.getElementById('games-left').innerText = `Sets: ${gameState[`p${leftPlayer}Games`]}`;
            document.getElementById('games-right').innerText = `Sets: ${gameState[`p${rightPlayer}Games`]}`;
            
            document.getElementById('score-left').innerText = gameState[`p${leftPlayer}Score`];
            document.getElementById('score-right').innerText = gameState[`p${rightPlayer}Score`];

            const btnLeft = document.getElementById('btn-score-left');
            const btnRight = document.getElementById('btn-score-right');
            btnLeft.className = `w-full py-8 rounded-[1.5rem] text-5xl font-black shadow-xl transition ${leftPlayer === 1 ? 'bg-blue-600 active:bg-blue-500' : 'bg-red-600 active:bg-red-500'}`;
            btnRight.className = `w-full py-8 rounded-[1.5rem] text-5xl font-black shadow-xl transition ${rightPlayer === 1 ? 'bg-blue-600 active:bg-blue-500' : 'bg-red-600 active:bg-red-500'}`;

            const totalPoints = gameState.p1Score + gameState.p2Score;
            const isDeuce = (gameState.p1Score >= 10 && gameState.p2Score >= 10);
            const turn = isDeuce ? (totalPoints % 2 === 0) : (Math.floor(totalPoints / 2) % 2 === 0);
            
            // 如果沒選發球員，預設 P1 先發
            const effectiveServer = gameState.gameFirstServer === 0 ? 1 : gameState.gameFirstServer;
            const p1Serves = (effectiveServer === 1) ? turn : !turn;

            const isLeftServing = (leftPlayer === 1 && p1Serves) || (leftPlayer === 2 && !p1Serves);
            const isRightServing = (rightPlayer === 1 && p1Serves) || (rightPlayer === 2 && !p1Serves);

            document.getElementById('card-left').classList.toggle('active-side', isLeftServing);
            document.getElementById('card-right').classList.toggle('active-side', isRightServing);

            // 更新 Sets 前的小燈號
            document.getElementById('serve-dot-left').classList.toggle('active', isLeftServing);
            document.getElementById('serve-dot-right').classList.toggle('active', isRightServing);

            document.getElementById('p1-select').value = gameState.p1Index;
            document.getElementById('p2-select').value = gameState.p2Index;
            document.getElementById('match-format').value = gameState.matchFormat;
            document.getElementById('manual-server').value = gameState.gameFirstServer;
        }

        function updatePlayerOptions() {
            const s1 = document.getElementById('p1-select'), s2 = document.getElementById('p2-select');
            let options = `<option value="-1">-- SELECT --</option>`;
            options += players.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
            s1.innerHTML = options; s2.innerHTML = options;
            s1.value = gameState.p1Index; s2.value = gameState.p2Index;
        }

        function undo() { 
            if (gameState.isGameOver) return;
            if (gameState.history?.length > 0) { 
                const last = JSON.parse(gameState.history.pop()); 
                Object.assign(gameState, { p1Score: last.s1, p2Score: last.s2, p1Games: last.g1, p2Games: last.g2, gameFirstServer: last.fs, setScores: last.ss || [] }); 
                pushTable(); 
            } 
        }
        
        function resetMatch() { 
            if(confirm("Reset Current Match?")){ 
                Object.assign(gameState, { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, history: [], setScores: [], p1Index: -1, p2Index: -1, isGameOver: false, gameFirstServer: 0 }); 
                pushTable(); 
            } 
        }

        function syncSettings() { gameState.matchFormat = parseInt(document.getElementById('match-format').value); pushTable(); }
        function initGameServer() { gameState.gameFirstServer = parseInt(document.getElementById('manual-server').value); pushTable(); }
        function syncMatchSelection() { gameState.p1Index = parseInt(document.getElementById('p1-select').value); gameState.p2Index = parseInt(document.getElementById('p2-select').value); pushTable(); }
        function addPlayer() { const n = document.getElementById('new-name').value.trim(); if(n){ players.push({name:n, elo:1200}); document.getElementById('new-name').value=''; pushPlayers(); } }
        function deleteSelectedPlayer() { if(isAdmin && gameState.p1Index !== -1 && confirm("Delete Player?")){ players.splice(gameState.p1Index, 1); pushPlayers(); } }

        switchTable(currentTable);
    </script>
</body>
</html>
