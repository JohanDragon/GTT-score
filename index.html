<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GTT Rankings</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { touch-action: manipulation; }
        .active-side { border: 6px solid #fbbf24; transform: scale(1.02); box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .sync-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .online { background: #10b981; box-shadow: 0 0 10px #10b981; }
        #custom-alert { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        .admin-only { display: none; }
        
        /* 橫向 Radio Button 樣式 */
        .radio-group { @apply flex items-stretch justify-center bg-slate-900/50 rounded-2xl border border-slate-800 p-2; }
        .radio-item { @apply flex-1 flex flex-col items-center justify-center py-2 cursor-pointer transition-all gap-2 px-4; }
        .divider { @apply w-[1px] bg-blue-500/30 my-2; }
        
        .radio-btn { 
            @apply w-6 h-6 rounded-full border-2 border-blue-500/50 flex items-center justify-center transition-all;
        }
        .radio-inner { @apply w-3.5 h-3.5 rounded-full bg-blue-500 scale-0 transition-transform; }
        
        /* 選中狀態：實心圓且有外環 */
        .radio-item.active .radio-btn { @apply border-blue-500 ring-2 ring-blue-500/20; }
        .radio-item.active .radio-inner { @apply scale-100; }
        .radio-item.active span { @apply text-white font-black; }
        .radio-item span { @apply text-[10px] font-bold text-slate-500 uppercase tracking-tighter; }

        @media (orientation: landscape) { .player-name-text { font-size: 1.5rem !important; } .score-text { font-size: 10rem !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans select-none">

    <div id="custom-alert" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[100] w-[85%] max-w-xs glass border border-yellow-500/50 p-8 rounded-[2.5rem] text-center shadow-2xl fade-in">
        <div class="text-5xl mb-4">🏆</div>
        <h2 class="text-2xl font-black uppercase mb-2">Match Finished</h2>
        <p id="winner-info" class="text-yellow-500 font-bold mb-6 italic text-lg"></p>
        <button onclick="closeAlert()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase">Confirm</button>
    </div>

    <div class="max-w-4xl mx-auto space-y-6 pb-12">
        <header class="text-center py-2">
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-tighter italic">GTT Rankings</h1>
            
            <div class="flex items-center justify-between mt-6 bg-slate-900/30 p-3 rounded-2xl border border-white/5">
                <div class="radio-group">
                    <div class="radio-item" onclick="switchTable(1)" id="btn-t1">
                        <div class="radio-btn"><div class="radio-inner"></div></div>
                        <span>TABLE 1</span>
                    </div>
                    <div class="divider"></div>
                    <div class="radio-item" onclick="switchTable(2)" id="btn-t2">
                        <div class="radio-btn"><div class="radio-inner"></div></div>
                        <span>TABLE 2</span>
                    </div>
                    <div class="divider"></div>
                    <div class="radio-item" onclick="switchTable(3)" id="btn-t3">
                        <div class="radio-btn"><div class="radio-inner"></div></div>
                        <span>TABLE 3</span>
                    </div>
                </div>

                <div id="mode-badge" class="px-4 py-3 rounded-xl bg-blue-500/10 text-blue-400 text-[10px] font-black tracking-widest border border-blue-500/20 uppercase">
                    SANCIPA MODE
                </div>
            </div>

            <div class="flex justify-center items-center mt-3 gap-2">
                <span id="status-dot" class="sync-indicator"></span>
                <span id="status-text" class="text-xs font-black text-slate-500 uppercase tracking-widest">Connecting...</span>
            </div>
        </header>

        <section class="glass p-5 rounded-[2rem] border border-slate-800 shadow-2xl space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <select id="match-format" onchange="syncSettings()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-sm outline-none">
                    <option value="3">3 Sets Win (BO5)</option>
                    <option value="4">4 Sets Win (BO7)</option>
                    <option value="5">5 Sets Win (BO9)</option>
                </select>
                <select id="manual-server" onchange="initGameServer()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-yellow-500 text-sm outline-none">
                    <option value="1">P1 Start</option>
                    <option value="2">P2 Start</option>
                </select>
            </div>
            <div class="space-y-3">
                <div class="flex items-center justify-between bg-slate-900/40 p-2 rounded-2xl border border-white/5">
                    <select id="p1-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-blue-400 font-black text-center text-sm appearance-none"></select>
                    <div class="text-slate-700 font-black italic">VS</div>
                    <select id="p2-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-red-400 font-black text-center text-sm appearance-none"></select>
                </div>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="New Name..." class="flex-1 bg-slate-900/50 p-3 rounded-xl border border-slate-800 outline-none text-center text-sm">
                    <button onclick="addPlayer()" class="bg-yellow-500 text-black px-5 font-black rounded-xl text-xs">ADD</button>
                    <button onclick="deleteSelectedPlayer()" class="admin-only bg-red-900/50 text-red-500 px-5 font-black rounded-xl text-xs border border-red-900/50">DEL</button>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 gap-4">
            <div id="card-1" class="glass p-5 rounded-[2.5rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-1" class="player-name-text text-sm font-black text-blue-400 mb-1 truncate uppercase">---</div>
                    <div id="games-1" class="text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase tracking-widest">Sets: 0</div>
                </div>
                <div id="score-1" class="score-text text-[8rem] leading-none font-black mb-4">0</div>
                <button onclick="changeScore(1, 1)" class="w-full bg-blue-600 py-8 rounded-[1.5rem] text-5xl font-black shadow-xl active:bg-blue-500 transition">＋</button>
            </div>
            <div id="card-2" class="glass p-5 rounded-[2.5rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-2" class="player-name-text text-sm font-black text-red-400 mb-1 truncate uppercase">---</div>
                    <div id="games-2" class="text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase tracking-widest">Sets: 0</div>
                </div>
                <div id="score-2" class="score-text text-[8rem] leading-none font-black mb-4">0</div>
                <button onclick="changeScore(2, 1)" class="w-full bg-red-600 py-8 rounded-[1.5rem] text-5xl font-black shadow-xl active:bg-red-500 transition">＋</button>
            </div>
        </main>

        <div class="flex gap-4">
            <button onclick="undo()" class="flex-1 bg-slate-900 py-4 rounded-xl font-black text-slate-500 text-[10px] border border-slate-800 uppercase tracking-widest">Return</button>
            <button onclick="resetMatch()" class="flex-1 bg-slate-900 py-4 rounded-xl font-black text-slate-500 text-[10px] border border-slate-800 uppercase tracking-widest">Reset</button>
        </div>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-yellow-500 px-2 tracking-widest flex items-center gap-2">🏆 Leaderboard</h2>
            <div id="leaderboard" class="glass rounded-[1.5rem] border border-slate-800 overflow-hidden divide-y divide-slate-800/50"></div>
        </section>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-slate-600 px-2 tracking-widest flex items-center gap-2">🕰️ Global History</h2>
            <div id="history-list" class="space-y-2"></div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQlhy2WXQ3M8e_olUj3xIRmmxv759lrrc",
            authDomain: "gtt-rankings.firebaseapp.com",
            databaseURL: "https://gtt-rankings-default-rtdb.firebaseio.com",
            projectId: "gtt-rankings",
            storageBucket: "gtt-rankings.firebasestorage.app",
            messagingSenderId: "96701388869",
            appId: "1:96701388869:web:f66a13c8cffe70c0c4eb2c",
            measurementId: "G-MJWRM5ZV8K"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('auth') === 'admin';
        
        let players = []; 
        let globalHistory = [];
        let currentTable = parseInt(localStorage.getItem('gtt_active_table')) || 1;
        let gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: 1, history: [], matchFormat: 3, p1Index: -1, p2Index: -1, setScores: [], isGameOver: false };

        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            const badge = document.getElementById('mode-badge');
            badge.innerText = "RANKING MODE"; badge.classList.replace('bg-blue-500/10', 'bg-red-500/10'); badge.classList.replace('text-blue-400', 'text-red-500');
            badge.classList.add('border-red-500/20');
        }

        const playersRef = db.ref('gtt_unified/players');
        const historyRef = db.ref('gtt_unified/global_history');
        let tableRef = null;

        playersRef.on('value', (snap) => { players = snap.val() || []; updatePlayerOptions(); renderLeaderboard(); });
        historyRef.on('value', (snap) => { globalHistory = snap.val() || []; renderHistory(); });

        function switchTable(num) {
            if (tableRef) tableRef.off();
            currentTable = num;
            localStorage.setItem('gtt_active_table', num);
            tableRef = db.ref(`gtt_unified/table_${num}_state`);
            tableRef.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    gameState = data;
                    if (!gameState.history) gameState.history = [];
                    if (!gameState.setScores) gameState.setScores = [];
                } else {
                    initLocalState();
                }
                updateUI();
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').innerText = `T${currentTable} LIVE`;
            });
            updateTableUI();
        }

        function initLocalState() {
            gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: 1, history: [], matchFormat: 3, p1Index: -1, p2Index: -1, setScores: [], isGameOver: false };
        }

        function updateTableUI() {
            [1, 2, 3].forEach(n => document.getElementById(`btn-t${n}`).classList.toggle('active', n === currentTable));
        }

        function pushTable() { tableRef.set(gameState); }
        function pushPlayers() { playersRef.set(players); }
        function pushHistory() { historyRef.set(globalHistory); }

        function changeScore(p, v) {
            if(gameState.isGameOver) return;
            if(gameState.p1Index === -1 || gameState.p2Index === -1) { alert("Select Players!"); return; }
            gameState.history.push(JSON.stringify({ s1: gameState.p1Score, s2: gameState.p2Score, g1: gameState.p1Games, g2: gameState.p2Games, fs: gameState.gameFirstServer, ss: [...(gameState.setScores || [])] }));
            if (gameState.history.length > 2) gameState.history.shift();
            p === 1 ? gameState.p1Score += v : gameState.p2Score += v;
            const diff = Math.abs(gameState.p1Score - gameState.p2Score);
            if ((gameState.p1Score >= 11 || gameState.p2Score >= 11) && diff >= 2) {
                gameState.setScores.push(`${gameState.p1Score}-${gameState.p2Score}`);
                gameState.p1Score > gameState.p2Score ? gameState.p1Games++ : gameState.p2Games++;
                gameState.p1Score = 0; gameState.p2Score = 0;
                gameState.gameFirstServer = (gameState.gameFirstServer === 1) ? 2 : 1;
                if (gameState.p1Games >= gameState.matchFormat || gameState.p2Games >= gameState.matchFormat) { 
                    gameState.isGameOver = true;
                    saveMatchResult(); 
                    return; 
                }
            }
            pushTable();
        }

        function saveMatchResult() {
            const p1Won = gameState.p1Games > gameState.p2Games;
            const p1 = players[gameState.p1Index], p2 = players[gameState.p2Index];
            if (isAdmin) {
                const exp = 1 / (1 + Math.pow(10, (p2.elo - p1.elo) / 400));
                const gain = Math.round(32 * ((p1Won ? 1 : 0) - exp));
                p1.elo += gain; p2.elo -= gain;
                pushPlayers();
                document.getElementById('winner-info').innerText = `${p1Won ? p1.name : p2.name} (+${gain} pts)`;
            } else {
                document.getElementById('winner-info').innerText = `${p1Won ? p1.name : p2.name} WINS!`;
            }
            globalHistory.unshift({
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                p1: p1.name, p2: p2.name,
                score: `${gameState.p1Games}-${gameState.p2Games}`,
                sets: gameState.setScores.join(', '),
                mode: isAdmin ? "[RANKING]" : "[SANCIPA]",
                table: `T${currentTable}`
            });
            if (globalHistory.length > 10) globalHistory.pop();
            pushHistory();
            document.getElementById('custom-alert').style.display = 'block';
            pushTable();
        }

        function closeAlert() { 
            document.getElementById('custom-alert').style.display = 'none'; 
            Object.assign(gameState, { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, history: [], setScores: [], p1Index: -1, p2Index: -1, isGameOver: false });
            pushTable(); 
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = globalHistory.map(r => `
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-1">
                    <div class="flex justify-between items-center text-[10px] font-black uppercase">
                        <span class="${r.mode === '[RANKING]' ? 'text-red-500' : 'text-blue-400'}">${r.mode} | ${r.table}</span>
                        <span class="text-slate-600">${r.time}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-xs font-bold uppercase"><span class="text-blue-400">${r.p1}</span> vs <span class="text-red-400">${r.p2}</span></div>
                        <div class="text-sm font-black text-yellow-500">${r.score}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            const sorted = [...players].sort((a, b) => b.elo - a.elo).slice(0, 10);
            container.innerHTML = sorted.map((p, i) => `
                <div class="flex items-center justify-between p-4 ${i === 0 ? 'bg-yellow-500/10' : ''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 text-center font-black ${i < 3 ? 'text-yellow-500' : 'text-slate-600'}">${i + 1}</span>
                        <span class="font-bold uppercase text-xs">${p.name}</span>
                    </div>
                    <div class="font-mono font-black text-yellow-500 text-sm">${p.elo}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('score-1').innerText = gameState.p1Score;
            document.getElementById('score-2').innerText = gameState.p2Score;
            document.getElementById('games-1').innerText = `Sets: ${gameState.p1Games}`;
            document.getElementById('games-2').innerText = `Sets: ${gameState.p2Games}`;
            document.getElementById('name-1').innerText = players[gameState.p1Index]?.name || "SELECT P1";
            document.getElementById('name-2').innerText = players[gameState.p2Index]?.name || "SELECT P2";
            document.getElementById('match-format').value = gameState.matchFormat;
            const total = gameState.p1Score + gameState.p2Score;
            const turn = (gameState.p1Score >= 10 && gameState.p2Score >= 10) ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            const p1Serves = (gameState.gameFirstServer === 1) ? turn : !turn;
            document.getElementById('card-1').classList.toggle('active-side', gameState.p1Index !== -1 && p1Serves);
            document.getElementById('card-2').classList.toggle('active-side', gameState.p2Index !== -1 && !p1Serves);
            document.getElementById('p1-select').value = gameState.p1Index;
            document.getElementById('p2-select').value = gameState.p2Index;
        }

        function updatePlayerOptions() {
            const s1 = document.getElementById('p1-select'), s2 = document.getElementById('p2-select');
            let options = `<option value="-1">-- SELECT PLAYER --</option>`;
            options += players.map((p, i) => `<option value="${i}">${p.name} [${p.elo}]</option>`).join('');
            s1.innerHTML = options; s2.innerHTML = options;
            s1.value = gameState.p1Index; s2.value = gameState.p2Index;
        }

        function undo() { if (gameState.isGameOver) return; if (gameState.history?.length > 0) { const last = JSON.parse(gameState.history.pop()); Object.assign(gameState, { p1Score: last.s1, p2Score: last.s2, p1Games: last.g1, p2Games: last.g2, gameFirstServer: last.fs, setScores: last.ss || [] }); pushTable(); } }
        function resetMatch() { if(confirm("Reset Match?")){ Object.assign(gameState, { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, history: [], setScores: [], p1Index: -1, p2Index: -1, isGameOver: false }); pushTable(); } }
        function syncSettings() { gameState.matchFormat = parseInt(document.getElementById('match-format').value); pushTable(); }
        function initGameServer() { gameState.gameFirstServer = parseInt(document.getElementById('manual-server').value); pushTable(); }
        function syncMatchSelection() { gameState.p1Index = parseInt(document.getElementById('p1-select').value); gameState.p2Index = parseInt(document.getElementById('p2-select').value); pushTable(); }
        function addPlayer() { const n = document.getElementById('new-name').value.trim(); if(n){ players.push({name:n, elo:1200}); document.getElementById('new-name').value=''; pushPlayers(); } }
        function deleteSelectedPlayer() { if(isAdmin && gameState.p1Index !== -1 && confirm("Delete?")){ players.splice(gameState.p1Index, 1); pushPlayers(); } }

        switchTable(currentTable);
    </script>
</body>
</html>
