<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GTT Rankings - Live Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心修復：防止螢幕連點放大 */
        * { touch-action: manipulation; }
        
        .active-side { border: 6px solid #fbbf24; transform: scale(1.02); box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
        .sync-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        #custom-alert { display: none; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        
        /* 管理員專用：未授權時隱藏操作介面 */
        .admin-only { display: none; }

        @media (orientation: landscape) {
            .player-name-text { font-size: 1.5rem !important; margin-bottom: 0.5rem !important; }
            .player-sets-text { font-size: 1rem !important; margin-bottom: 1rem !important; }
            .score-text { font-size: 10rem !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 font-sans select-none relative">

    <div id="custom-alert" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[100] w-[85%] max-w-xs glass border border-yellow-500/50 p-8 rounded-[2.5rem] text-center shadow-2xl fade-in">
        <div class="text-5xl mb-4">🏆</div>
        <h2 class="text-2xl font-black uppercase tracking-tighter mb-2">Match Finished</h2>
        <p id="winner-info" class="text-yellow-500 font-bold mb-6 italic text-lg"></p>
        <button onclick="closeAlert()" class="w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase active:scale-95 transition">Confirm</button>
    </div>

    <div class="max-w-4xl mx-auto space-y-5 pb-12">
        <header class="text-center py-2">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 uppercase tracking-tighter">GTT Rankings</h1>
            <div class="flex justify-center items-center mt-1">
                <span id="status-dot" class="sync-indicator"></span>
                <p id="status-text" class="text-slate-600 text-[10px] font-bold tracking-[0.3em] uppercase">Connecting...</p>
                <span id="admin-badge" class="ml-2 text-[8px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded hidden">ADMIN</span>
            </div>
        </header>

        <section class="admin-only glass p-5 rounded-[2rem] border border-slate-800 shadow-2xl space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <select id="match-format" onchange="syncSettings()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-sm outline-none">
                    <option value="3">3 Sets Win (BO5)</option>
                    <option value="4">4 Sets Win (BO7)</option>
                    <option value="5">5 Sets Win (BO9)</option>
                </select>
                <select id="manual-server" onchange="initGameServer()" class="bg-slate-800 p-3 rounded-xl border border-slate-700 font-bold text-yellow-500 text-sm outline-none">
                    <option value="1">P1 Start</option>
                    <option value="2">P2 Start</option>
                </select>
            </div>
            <div class="space-y-3">
                <div class="flex items-center justify-between bg-slate-900/40 p-2 rounded-2xl border border-white/5">
                    <select id="p1-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-blue-400 font-black text-center text-sm"></select>
                    <div class="text-slate-700 font-black italic">VS</div>
                    <select id="p2-select" onchange="syncMatchSelection()" class="w-[44%] bg-transparent py-2 outline-none text-red-400 font-black text-center text-sm"></select>
                </div>
                <div class="flex gap-2">
                    <input id="new-name" type="text" placeholder="New Player Name..." class="flex-1 bg-slate-900/50 p-3 rounded-xl border border-slate-800 outline-none text-center text-sm">
                    <button onclick="addPlayer()" class="bg-yellow-500 text-black px-5 font-black rounded-xl text-xs">ADD</button>
                    <button onclick="deleteSelectedPlayer()" class="bg-red-900/50 text-red-500 px-5 font-black rounded-xl text-xs border border-red-900/50">DEL</button>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 gap-6">
            <div id="card-1" class="glass p-6 rounded-[3rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-1" class="player-name-text text-sm font-black text-blue-400 mb-1 truncate uppercase">---</div>
                    <div id="games-1" class="player-sets-text text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase">Sets: 0</div>
                </div>
                <div id="score-1" class="score-text text-[8rem] leading-none font-black mb-6">0</div>
                <button onclick="changeScore(1, 1)" class="admin-only w-full bg-blue-600 h-28 rounded-[2rem] text-6xl font-black shadow-xl active:bg-blue-500 transition">＋</button>
            </div>
            <div id="card-2" class="glass p-6 rounded-[3rem] border border-slate-800 text-center transition-all flex flex-col justify-between">
                <div>
                    <div id="name-2" class="player-name-text text-sm font-black text-red-400 mb-1 truncate uppercase">---</div>
                    <div id="games-2" class="player-sets-text text-[10px] text-slate-500 mb-2 font-mono font-bold uppercase">Sets: 0</div>
                </div>
                <div id="score-2" class="score-text text-[8rem] leading-none font-black mb-6">0</div>
                <button onclick="changeScore(2, 1)" class="admin-only w-full bg-red-600 h-28 rounded-[2rem] text-6xl font-black shadow-xl active:bg-red-500 transition">＋</button>
            </div>
        </main>

        <div class="admin-only flex gap-4">
            <button onclick="undo()" class="flex-1 bg-slate-900 py-5 rounded-2xl font-black text-slate-500 text-xs border border-slate-800">Return</button>
            <button onclick="resetMatch()" class="flex-1 bg-slate-900 py-5 rounded-2xl font-black text-slate-500 text-xs border border-slate-800">Reset</button>
        </div>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-yellow-500 px-2 tracking-widest flex items-center"><span class="mr-2">🏆</span> Top 10 Leaderboard</h2>
            <div id="leaderboard" class="glass rounded-[1.5rem] border border-slate-800 overflow-hidden divide-y divide-slate-800/50"></div>
        </section>

        <section class="space-y-3">
            <h2 class="text-xs font-black uppercase text-slate-600 px-2 tracking-widest">Recent 5 Matches</h2>
            <div id="history-list" class="space-y-2"></div>
        </section>
    </div>

    <script>
        // --- 已填入您的 Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAQlhy2WXQ3M8e_olUj3xIRmmxv759lrrc",
            authDomain: "gtt-rankings.firebaseapp.com",
            databaseURL: "https://gtt-rankings-default-rtdb.firebaseio.com",
            projectId: "gtt-rankings",
            storageBucket: "gtt-rankings.firebasestorage.app",
            messagingSenderId: "96701388869",
            appId: "1:96701388869:web:f66a13c8cffe70c0c4eb2c",
            measurementId: "G-MJWRM5ZV8K"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dataRef = db.ref('gtt_live_data');

        // 權限檢查
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('auth') === 'admin';

        if (isAdmin) {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('admin-badge').classList.remove('hidden');
        }

        let players = [];
        let matchRecords = [];
        let gameState = { p1Score: 0, p2Score: 0, p1Games: 0, p2Games: 0, gameFirstServer: 1, history: [], matchFormat: 3, p1Index: -1, p2Index: -1 };

        function cloudPush() { if(isAdmin) dataRef.set({ players, matchRecords, gameState }); }

        dataRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                players = data.players || [];
                matchRecords = data.matchRecords || [];
                if (data.gameState) {
                    gameState = data.gameState;
                    if (!gameState.history) gameState.history = [];
                }
                updateUI();
                updatePlayerOptions();
                renderHistory();
                renderLeaderboard();
                document.getElementById('status-dot').classList.add('online');
                document.getElementById('status-text').innerText = isAdmin ? "Live Admin" : "Live Watching";
            } else {
                if(isAdmin) cloudPush();
            }
        });

        function changeScore(p, v) {
            if(!isAdmin) return;
            if(gameState.p1Index === -1 || gameState.p2Index === -1) {
                alert("Please select both players first!");
                return;
            }
            gameState.history.push(JSON.stringify({ s1: gameState.p1Score, s2: gameState.p2Score, g1: gameState.p1Games, g2: gameState.p2Games, fs: gameState.gameFirstServer }));
            if (gameState.history.length > 2) gameState.history.shift();
            p === 1 ? gameState.p1Score += v : gameState.p2Score += v;
            
            const diff = Math.abs(gameState.p1Score - gameState.p2Score);
            if ((gameState.p1Score >= 11 || gameState.p2Score >= 11) && diff >= 2) {
                gameState.p1Score > gameState.p2Score ? gameState.p1Games++ : gameState.p2Games++;
                gameState.p1Score = 0; gameState.p2Score = 0;
                gameState.gameFirstServer = (gameState.gameFirstServer === 1) ? 2 : 1;
                if (gameState.p1Games >= gameState.matchFormat || gameState.p2Games >= gameState.matchFormat) {
                    saveMatchResult();
                    return;
                }
            }
            cloudPush();
        }

        function saveMatchResult() {
            const p1Won = gameState.p1Games > gameState.p2Games;
            const p1 = players[gameState.p1Index], p2 = players[gameState.p2Index];
            const exp = 1 / (1 + Math.pow(10, (p2.elo - p1.elo) / 400));
            const gain = Math.round(32 * ((p1Won ? 1 : 0) - exp));
            p1.elo += gain; p2.elo -= gain;

            document.getElementById('winner-info').innerText = `${p1Won ? p1.name : p2.name} (+${gain})`;
            document.getElementById('custom-alert').style.display = 'block';

            matchRecords.unshift({
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                p1: p1.name, p2: p2.name, score: `${gameState.p1Games}-${gameState.p2Games}`, gain: gain
            });
            if (matchRecords.length > 5) matchRecords.pop();

            gameState.p1Score = 0; gameState.p2Score = 0; gameState.p1Games = 0; gameState.p2Games = 0; gameState.history = [];
            cloudPush();
        }

        function closeAlert() { 
            document.getElementById('custom-alert').style.display = 'none'; 
            if(isAdmin) {
                gameState.p1Index = -1; gameState.p2Index = -1;
                cloudPush();
            }
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            const sorted = [...players].sort((a, b) => b.elo - a.elo).slice(0, 10);
            container.innerHTML = sorted.map((p, i) => `
                <div class="flex items-center justify-between p-4 ${i === 0 ? 'bg-yellow-500/10' : ''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 text-center font-black ${i < 3 ? 'text-yellow-500' : 'text-slate-600'}">${i + 1}</span>
                        <span class="font-bold uppercase text-sm">${p.name}</span>
                    </div>
                    <div class="font-mono font-black text-yellow-500">${p.elo}</div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = matchRecords.map(r => `
                <div class="glass p-3 rounded-xl border border-slate-800 flex justify-between items-center text-[10px]">
                    <div class="font-bold"><span class="text-blue-400">${r.p1}</span> vs <span class="text-red-400">${r.p2}</span></div>
                    <div class="font-black text-yellow-500">${r.score} <span class="text-slate-600 font-normal ml-2">${r.time}</span></div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('score-1').innerText = gameState.p1Score;
            document.getElementById('score-2').innerText = gameState.p2Score;
            document.getElementById('games-1').innerText = `Sets: ${gameState.p1Games}`;
            document.getElementById('games-2').innerText = `Sets: ${gameState.p2Games}`;
            document.getElementById('name-1').innerText = players[gameState.p1Index]?.name || "Select Player 1";
            document.getElementById('name-2').innerText = players[gameState.p2Index]?.name || "Select Player 2";
            document.getElementById('match-format').value = gameState.matchFormat;
            const total = gameState.p1Score + gameState.p2Score;
            const turn = (gameState.p1Score >= 10 && gameState.p2Score >= 10) ? (total % 2 === 0) : (Math.floor(total / 2) % 2 === 0);
            const p1Serves = (gameState.gameFirstServer === 1) ? turn : !turn;
            const hasPlayers = gameState.p1Index !== -1 && gameState.p2Index !== -1;
            document.getElementById('card-1').classList.toggle('active-side', hasPlayers && p1Serves);
            document.getElementById('card-2').classList.toggle('active-side', hasPlayers && !p1Serves);
        }

        function updatePlayerOptions() {
            const s1 = document.getElementById('p1-select'), s2 = document.getElementById('p2-select');
            let options = `<option value="-1">-- Select Player --</option>`;
            options += players.map((p, i) => `<option value="${i}">${p.name} [${p.elo}]</option>`).join('');
            if (s1.options.length - 1 !== players.length) { s1.innerHTML = options; s2.innerHTML = options; }
            s1.value = gameState.p1Index; s2.value = gameState.p2Index;
        }

        function undo() { if (isAdmin && gameState.history?.length > 0) { const last = JSON.parse(gameState.history.pop()); gameState.p1Score = last.s1; gameState.p2Score = last.s2; gameState.p1Games = last.g1; gameState.p2Games = last.g2; gameState.gameFirstServer = last.fs; cloudPush(); } }
        function resetMatch() { if(isAdmin && confirm("Reset Match?")){ gameState.p1Score = 0; gameState.p2Score = 0; gameState.p1Games = 0; gameState.p2Games = 0; gameState.history = []; gameState.p1Index = -1; gameState.p2Index = -1; cloudPush(); } }
        function syncSettings() { if(isAdmin) { gameState.matchFormat = parseInt(document.getElementById('match-format').value); cloudPush(); } }
        function initGameServer() { if(isAdmin) { gameState.gameFirstServer = parseInt(document.getElementById('manual-server').value); cloudPush(); } }
        function syncMatchSelection() { if(isAdmin) { gameState.p1Index = parseInt(document.getElementById('p1-select').value); gameState.p2Index = parseInt(document.getElementById('p2-select').value); cloudPush(); } }
        function addPlayer() { if(isAdmin) { const n = document.getElementById('new-name').value.trim(); if(n){ players.push({name:n, elo:1200}); document.getElementById('new-name').value=''; cloudPush(); } } }
        function deleteSelectedPlayer() { if(isAdmin && gameState.p1Index !== -1 && confirm("Delete selected?")){ players.splice(gameState.p1Index, 1); gameState.p1Index=-1; gameState.p2Index=-1; cloudPush(); } }
    </script>
</body>
</html>
